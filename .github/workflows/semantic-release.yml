name: Semantic Release

on:
  push:
    branches:
      - main
      - beta
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Build release variant
        if: github.event_name == 'push'
        run: npm run build:${RELEASE_CHANNEL}
        env:
          RELEASE_CHANNEL: ${{ github.ref_name == 'beta' && 'beta' || 'main' }}

      - name: Release update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release ${{ github.event_name == 'push' && '--dry-run' || '' }}

      - name: Generate artifact attestation (main release)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/attest@v4
        with:
          subject-path: |
            build/main.js
            build/styles.css
