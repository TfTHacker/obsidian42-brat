# Manual release-it fallback. Keep this for ad-hoc releases, but do not run it automatically.
name: Release It

on:
  workflow_dispatch:

jobs:
  pre-release-it:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: git config
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
      - run: npm install
      - name: Build release variant
        run: npm run build:${RELEASE_CHANNEL}
        env:
          RELEASE_CHANNEL: ${{ github.ref_name == 'beta' && 'beta' || 'main' }}
      - run: npx -p @release-it/bumper -p @release-it/conventional-changelog release-it --git.requireBranch="main" --git.requireCleanWorkingDir=false --ci --dry-run
        name: Release (DRY RUN)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npx -p @release-it/bumper -p @release-it/conventional-changelog release-it --git.requireBranch="main" --git.requireCleanWorkingDir=false --ci
        name: Release
        if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate artifact attestation (main release)
        if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
        uses: actions/attest@v4
        with:
          subject-path: |
            build/main.js
            build/styles.css
      - run: npx -p @release-it/bumper -p @release-it/conventional-changelog release-it --git.requireCleanWorkingDir=false --preRelease=beta --ci --dry-run
        name: Pre-Release (DRY RUN)
        if: github.event_name == 'push' && github.ref == 'refs/heads/beta'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npx -p @release-it/bumper -p @release-it/conventional-changelog release-it --git.requireCleanWorkingDir=false --preRelease=beta --ci
        name: Pre-Release
        if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/beta'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
