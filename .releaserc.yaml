# Semantic release configuration for this Obsidian plugin.
# Run `npx semantic-release` in CI after building the selected release variant.
branches:
  - main
  - name: beta
    prerelease: beta
plugins:
  - - "@semantic-release/commit-analyzer"
    - preset: conventionalcommits
  - - "@semantic-release/release-notes-generator"
    - preset: conventionalcommits
  - - "@semantic-release/exec"
    - prepareCmd: npm run build:${branch.name}
  - semantic-release-obsidian-plugin
  - - "@semantic-release/github"
    - assets:
        - path: build/main.js
        - path: build/manifest.json
        - path: build/styles.css
  - - "@semantic-release/git"
    - assets:
        - manifest.json
        - versions.json
      message: >-
        chore: :rocket: deploy release ${nextRelease.version} [skip ci]

        ${nextRelease.notes}
tagFormat: "${version}"
